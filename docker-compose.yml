# ===========================================
# StockBaller - Docker Compose for Development
# ===========================================
version: '3.8'

services:
  # ===========================================
  # API Backend
  # ===========================================
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL}
      - CORS_ORIGINS=*
    depends_on:
      - mongodb
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===========================================
  # MongoDB Database
  # ===========================================
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:-stockballer123}
    restart: unless-stopped

  # ===========================================
  # MongoDB Admin UI (optional)
  # ===========================================
  mongo-express:
    image: mongo-express:latest
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGO_PASSWORD:-stockballer123}
      - ME_CONFIG_MONGODB_URL=mongodb://admin:${MONGO_PASSWORD:-stockballer123}@mongodb:27017/
    depends_on:
      - mongodb
    profiles:
      - admin  # Only start with: docker-compose --profile admin up

volumes:
  mongodb_data:
